<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二分查找 · Binary Search</title>
  <link rel="stylesheet" href="../../css/common.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/animations.css" />
</head>
<body>
  <header class="page-header">
    <h1>二分查找 (Binary Search)</h1>
    <div class="subtitle">
      在有序数组中查找目标值 target。每次取中间元素与目标比较，将搜索范围缩小一半。
      时间复杂度 O(log n)，空间复杂度 O(1)。
    </div>
  </header>

  <main class="app-container">
    <section class="control-panel" id="control-panel">
      <div class="control-group">
        <button id="btn-reset" class="btn btn-icon">↺</button>
        <button id="btn-prev" class="btn btn-icon">◀</button>
        <button id="btn-play" class="btn btn-primary">▶</button>
        <button id="btn-pause" class="btn btn-icon">❚❚</button>
        <button id="btn-next" class="btn btn-icon">▶|</button>
      </div>
      <div class="control-group">
        <label for="speed-slider">速度</label>
        <input id="speed-slider" class="speed-slider" type="range" min="120" max="2000" step="40" value="900" />
        <span id="speed-value" class="speed-value">900 ms</span>
      </div>
      <div class="control-group" style="margin-left:auto;">
        <label for="target-input">目标值</label>
        <input id="target-input" type="number" value="13"
               style="width:70px;padding:6px 8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-panel);color:var(--text-primary);font-family:var(--font-mono);" />
        <button id="btn-apply" class="btn">应用</button>
        <span class="badge" id="step-counter">步骤 0 / 0</span>
      </div>
    </section>

    <section class="main-grid">
      <div class="visual-area">
        <div class="visual-title">有序数组可视化</div>
        <div class="visual-content" id="visual-content"></div>
        <div class="state-panel" id="state-panel"></div>
      </div>
      <div id="code-panel"></div>
    </section>

    <section class="step-info" id="step-info">
      <span class="step-counter" id="step-counter-info">准备开始</span>
      <div class="step-title" id="step-title">点击 “播放” 或 “下一步” 开始演示</div>
      <div class="step-desc" id="step-desc"></div>
      <div class="step-detail" id="step-detail"></div>
    </section>
  </main>

  <script src="../../js/common.js"></script>
  <script src="../../js/code-panel.js"></script>
  <script src="../../js/controls.js"></script>
  <script>
    const ALGORITHM_CODE = `function binarySearch(arr, target) {
  let left = 0, right = arr.length - 1;
  while (left <= right) {
    const mid = Math.floor((left + right) / 2);
    if (arr[mid] === target) return mid;
    if (arr[mid] < target) left = mid + 1;
    else right = mid - 1;
  }
  return -1;
}`;

    function buildSteps(arr, target) {
      const steps = [];
      steps.push({
        title: "初始化",
        desc: `在数组 [${arr.join(", ")}] 中查找 ${target}。`,
        detail: "left = 0, right = " + (arr.length - 1),
        line: 1,
        left: 0, right: arr.length - 1, mid: -1,
        found: false, failed: false,
      });

      let left = 0, right = arr.length - 1;
      while (left <= right) {
        const mid = Math.floor((left + right) / 2);
        steps.push({
          title: `计算中间位置 mid = ${mid}`,
          desc: `当前搜索范围 [${left}, ${right}]，中间位置 mid=${mid}，arr[mid]=${arr[mid]}。`,
          detail: `比较 arr[${mid}]=${arr[mid]} 与 target=${target}`,
          line: 3,
          left, right, mid,
          found: false, failed: false,
        });

        if (arr[mid] === target) {
          steps.push({
            title: `找到目标 ${target}`,
            desc: `arr[${mid}] === ${target}，返回下标 ${mid}。`,
            detail: `return ${mid};`,
            line: 4,
            left, right, mid,
            found: true, failed: false,
          });
          return steps;
        }
        if (arr[mid] < target) {
          steps.push({
            title: `arr[${mid}] < target`,
            desc: `${arr[mid]} < ${target}，搜索右半部分。`,
            detail: `left = mid + 1 = ${mid + 1}`,
            line: 5,
            left: mid + 1, right, mid,
            found: false, failed: false,
          });
          left = mid + 1;
        } else {
          steps.push({
            title: `arr[${mid}] > target`,
            desc: `${arr[mid]} > ${target}，搜索左半部分。`,
            detail: `right = mid - 1 = ${mid - 1}`,
            line: 6,
            left, right: mid - 1, mid,
            found: false, failed: false,
          });
          right = mid - 1;
        }
      }

      steps.push({
        title: "未找到目标",
        desc: `搜索范围已空，数组中不存在 ${target}。`,
        detail: "return -1;",
        line: 8,
        left, right, mid: -1,
        found: false, failed: true,
      });
      return steps;
    }

    const codePanel = new CodePanel("#code-panel", {
      language: "javascript",
      code: ALGORITHM_CODE,
    });

    const ARR = [2, 5, 8, 12, 13, 16, 23, 38, 56, 72, 91];
    let controller;

    function init(target) {
      if (controller) controller.pause();
      const steps = buildSteps(ARR, target);
      controller = new StepController({
        steps: steps,
        autoSpeed: 900,
        onStep: function (step) {
          document.getElementById("step-title").textContent = step.title;
          document.getElementById("step-desc").textContent = step.desc;
          document.getElementById("step-detail").textContent = step.detail || "";
          codePanel.highlight(step.line);
          renderVisual(step);
        },
        onReset: function () {
          document.getElementById("step-title").textContent = "已重置";
          document.getElementById("step-desc").textContent = "";
          document.getElementById("step-detail").textContent = "";
          codePanel.clear();
          renderVisual(null);
        },
      });
      bindControls(controller);
      controller.reset();
    }

    function renderVisual(step) {
      const container = document.getElementById("visual-content");
      const state = document.getElementById("state-panel");
      let left = -1, right = -1, mid = -1, foundIdx = -1, failed = false;
      if (step) {
        left = step.left; right = step.right; mid = step.mid;
        if (step.found) foundIdx = mid;
        failed = step.failed;
      }

      let html = '<div class="array-view anim-fade-in">';
      for (let i = 0; i < ARR.length; i++) {
        let cls = "array-cell";
        const inRange = left >= 0 && i >= left && i <= right;
        if (!inRange && left >= 0) cls += " discarded";
        if (i === mid) cls += " mid anim-pulse";
        if (i === foundIdx) cls += " found anim-pop-in";
        html += '<div class="' + cls + '">' + ARR[i] + "</div>";
      }
      html += "</div>";
      container.innerHTML = html;

      if (!step) {
        state.innerHTML = "";
        return;
      }
      state.innerHTML =
        '<span class="state-item"><span class="key">left</span><span class="value">' + left + "</span></span>" +
        '<span class="state-item"><span class="key">right</span><span class="value">' + right + "</span></span>" +
        '<span class="state-item"><span class="key">mid</span><span class="value">' + (mid >= 0 ? mid : "-") + "</span></span>" +
        '<span class="state-item"><span class="key">状态</span><span class="value">' +
        (foundIdx >= 0 ? "找到 idx=" + foundIdx : failed ? "未找到 -1" : "搜索中") +
        "</span></span>";
    }

    document.getElementById("btn-apply").addEventListener("click", () => {
      const t = parseInt(document.getElementById("target-input").value, 10);
      init(isNaN(t) ? 13 : t);
    });

    init(13);
  </script>
  <div style="width:100%;text-align:center;padding:20px;color:#6b7280;font-size:13px;border-top:1px solid #e5e7eb;margin-top:auto;">© 2026 AlgoStep. Created by 赵博宇. All rights reserved.</div>
</body>
</html>
