<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冒泡排序 · Bubble Sort</title>
  <link rel="stylesheet" href="../../css/common.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/animations.css" />
</head>
<body>
  <header class="page-header">
    <h1>冒泡排序 (Bubble Sort)</h1>
    <div class="subtitle">
      依次比较相邻两元素，把较大者逐步 “冒泡” 到末尾。
      时间复杂度 O(n²)，空间复杂度 O(1)。
    </div>
  </header>

  <main class="app-container">
    <section class="control-panel" id="control-panel">
      <div class="control-group">
        <button id="btn-reset" class="btn btn-icon">↺</button>
        <button id="btn-prev" class="btn btn-icon">◀</button>
        <button id="btn-play" class="btn btn-primary">▶</button>
        <button id="btn-pause" class="btn btn-icon">❚❚</button>
        <button id="btn-next" class="btn btn-icon">▶|</button>
      </div>
      <div class="control-group">
        <label for="speed-slider">速度</label>
        <input id="speed-slider" class="speed-slider" type="range" min="120" max="2000" step="40" value="900" />
        <span id="speed-value" class="speed-value">900 ms</span>
      </div>
      <div class="control-group" style="margin-left:auto;">
        <span class="badge" id="step-counter">步骤 0 / 0</span>
      </div>
    </section>

    <section class="main-grid">
      <div class="visual-area">
        <div class="visual-title">柱状图可视化</div>
        <div class="visual-content" id="visual-content"></div>
        <div class="state-panel" id="state-panel"></div>
      </div>
      <div id="code-panel"></div>
    </section>

    <section class="step-info" id="step-info">
      <span class="step-counter" id="step-counter-info">准备开始</span>
      <div class="step-title" id="step-title">点击 “播放” 或 “下一步” 开始演示</div>
      <div class="step-desc" id="step-desc"></div>
      <div class="step-detail" id="step-detail"></div>
    </section>
  </main>

  <script src="../../js/common.js"></script>
  <script src="../../js/code-panel.js"></script>
  <script src="../../js/controls.js"></script>
  <script>
    const ALGORITHM_CODE = `function bubbleSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - i - 1; j++) {
      if (arr[j] > arr[j + 1]) {
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
      }
    }
  }
  return arr;
}`;

    function buildSteps(initial) {
      const arr = initial.slice();
      const n = arr.length;
      const steps = [];
      steps.push({
        title: "初始数组",
        desc: "等待比较与交换。",
        detail: "arr = [" + arr.join(", ") + "]",
        line: 1,
        arr: arr.slice(),
        compare: [],
        swap: [],
        sorted: [],
      });

      for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - i - 1; j++) {
          steps.push({
            title: `比较 a[${j}] 与 a[${j + 1}]`,
            desc: `比较 arr[${j}]=${arr[j]} 与 arr[${j + 1}]=${arr[j + 1]}。`,
            detail: arr[j] > arr[j + 1] ? `${arr[j]} > ${arr[j + 1]}，需要交换` : `${arr[j]} <= ${arr[j + 1]}，无需交换`,
            line: 4,
            arr: arr.slice(),
            compare: [j, j + 1],
            swap: [],
            sorted: range(n - i, n),
          });

          if (arr[j] > arr[j + 1]) {
            [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
            steps.push({
              title: `交换 a[${j}] 与 a[${j + 1}]`,
              desc: `交换后数组变为 [${arr.join(", ")}]。`,
              detail: "swap(arr[" + j + "], arr[" + (j + 1) + "])",
              line: 5,
              arr: arr.slice(),
              compare: [],
              swap: [j, j + 1],
              sorted: range(n - i, n),
            });
          }
        }
      }

      steps.push({
        title: "排序完成",
        desc: "数组已按升序排列。",
        detail: "arr = [" + arr.join(", ") + "]",
        line: 8,
        arr: arr.slice(),
        compare: [],
        swap: [],
        sorted: range(0, n),
        done: true,
      });

      return steps;
    }

    function range(start, end) {
      const a = [];
      for (let i = start; i < end; i++) a.push(i);
      return a;
    }

    const codePanel = new CodePanel("#code-panel", {
      language: "javascript",
      code: ALGORITHM_CODE,
    });

    const INITIAL = [5, 2, 9, 1, 7, 3, 8, 4];
    const steps = buildSteps(INITIAL);
    let controller;

    function renderVisual(step) {
      const container = document.getElementById("visual-content");
      const state = document.getElementById("state-panel");
      if (!step) {
        container.innerHTML = buildBars(INITIAL, [], [], []);
        state.innerHTML = "";
        return;
      }
      container.innerHTML = buildBars(step.arr, step.compare, step.swap, step.sorted);
      state.innerHTML =
        '<span class="state-item"><span class="key">arr</span><span class="value">[' +
        step.arr.join(", ") + "]</span></span>";
    }

    function buildBars(arr, compare, swap, sorted) {
      const max = Math.max.apply(null, arr);
      let html = '<div class="bar-chart anim-fade-in">';
      for (let i = 0; i < arr.length; i++) {
        let cls = "bar";
        if (compare.indexOf(i) !== -1) cls += " compare anim-pulse";
        if (swap.indexOf(i) !== -1) cls += " swap anim-shake";
        if (sorted.indexOf(i) !== -1) cls += " sorted";
        const height = Math.round((arr[i] / max) * 220) + 20;
        html +=
          '<div class="' + cls + '" style="height:' + height + 'px;">' + arr[i] + "</div>";
      }
      html += "</div>";
      return html;
    }

    controller = new StepController({
      steps: steps,
      autoSpeed: 900,
      onStep: function (step) {
        document.getElementById("step-title").textContent = step.title;
        document.getElementById("step-desc").textContent = step.desc;
        document.getElementById("step-detail").textContent = step.detail || "";
        codePanel.highlight(step.line);
        renderVisual(step);
      },
      onReset: function () {
        document.getElementById("step-title").textContent = "已重置";
        document.getElementById("step-desc").textContent = "";
        document.getElementById("step-detail").textContent = "";
        codePanel.clear();
        renderVisual(null);
      },
    });
    bindControls(controller);
    controller.reset();
  </script>
  <div style="width:100%;text-align:center;padding:20px;color:#6b7280;font-size:13px;border-top:1px solid #e5e7eb;margin-top:auto;">© 2026 AlgoStep. Created by 赵博宇. All rights reserved.</div>
</body>
</html>
